databases:
  - name: task-manager-db
    plan: free
    databaseName: task_manager
    user: task_manager_user

services:
  - type: web
    name: task-manager-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://web-task-manager.vercel.app
      - key: PORT
        value: "8080"
